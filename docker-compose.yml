services:
  db:
    image: postgres:16-alpine
    container_name: hayit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hayit_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d hayit_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: hayit_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: "8681433587:AAHEYbBISao8SnD-wAcvsO6TOpZouAeQoQs"
      DATABASE_URL: "postgresql://botuser:botpassword@db:5432/hayit_bot"
    volumes:
      - ./images:/app/images

volumes:
  postgres_data: